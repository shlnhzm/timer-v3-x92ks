<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Game Timer - Fixed Calibration</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: #1a1a1a; color: #eee; 
            display: flex; gap: 20px; padding: 20px; font-size: 20px;
            height: 100vh; overflow: hidden; box-sizing: border-box;
        }
        .column { flex: 1; display: flex; flex-direction: column; min-width: 480px; height: 100%; }
        
        /* メインヘッダー（バトルタイムとライガー）の高さ統一 */
        .fixed-header { 
            flex-shrink: 0; background: #1a1a1a; z-index: 10; 
            border-bottom: 2px solid #444; margin-bottom: 10px;
            height: 140px; display: flex; flex-direction: column; justify-content: center;
        }

        .top-info-row { height: 120px; display: flex; align-items: center; justify-content: center; gap: 30px; }
        .main-timer { font-size: 80px; color: #0f0; font-family: 'Courier New', monospace; font-weight: bold; text-shadow: 0 0 15px rgba(0,255,0,0.7); }
        
        .sync-input {
            width: 110px; height: 60px; background: #333; color: #fff; border: 3px solid #666;
            border-radius: 8px; font-size: 32px; text-align: center;
            font-family: 'Courier New', monospace; font-weight: bold;
        }

        .start-btn { 
            background: #ff4444; color: #fff; border: none; padding: 15px 40px; 
            border-radius: 12px; cursor: pointer; font-size: 28px; font-weight: bold;
            box-shadow: 0 6px #992222; transition: all 0.1s;
        }
        .start-btn.running { background: #00ff00; color: #000; box-shadow: 0 6px #009900; }

        /* 表の上の補正ボタンエリア */
        .table-header-controls {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            padding: 10px 0; background: #2a2a2a; border-radius: 8px 8px 0 0;
            border-bottom: 2px solid #444;
        }

        .btn-calib {
            width: 60px; height: 50px; font-size: 28px; font-weight: bold; cursor: pointer; 
            border-radius: 8px; border: none; box-shadow: 0 4px #000; transition: all 0.1s;
        }
        .btn-calib:active { transform: translateY(2px); box-shadow: 0 2px #000; }
        
        .btn-calib-A { background: #ffff00; color: #000; } /* サークル：黄色 */
        .btn-calib-G { background: #ff0000; color: #fff; } /* グランド：赤色 */

        .table-container { 
            flex-grow: 1; overflow-y: auto; background: #fff; border-radius: 0 0 8px 8px; 
            position: relative; scroll-behavior: smooth; cursor: pointer;
        }
        #containerA { border: 6px solid #ffff00; border-top: none; }
        #containerG { border: 6px solid #ff0000; border-top: none; }
        
        #wrapperA { border: 6px solid #ffff00; border-radius: 8px; display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        #wrapperG { border: 6px solid #ff0000; border-radius: 8px; display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }

        .table-container.flash-A { animation: flashYellow 0.4s; }
        .table-container.flash-G { animation: flashRed 0.4s; }
        @keyframes flashYellow { 0% { background-color: #ffffcc; } 100% { background-color: #fff; } }
        @keyframes flashRed { 0% { background-color: #ffcccc; } 100% { background-color: #fff; } }

        table { width: 100%; border-collapse: collapse; color: #000; font-size: 24px; pointer-events: none; }
        thead th { position: sticky; top: 0; background: #e6e6e6; z-index: 5; border-bottom: 3px solid #999; padding: 15px; font-size: 20px; color: #333; }
        td { border: 1px solid #ccc; padding: 18px 10px; text-align: center; }
        
        .current-row { background-color: #ff9999 !important; font-weight: bold; border-top: 4px solid red !important; border-bottom: 4px solid red !important; }
        .next-row { background-color: #ffff99 !important; font-weight: bold; }

        .liger-container { display: flex; align-items: center; gap: 15px; background: #222; padding: 15px 25px; border-radius: 10px; border: 1px solid #444; }
        .btn-liger { background: #444; color: #fff; border: 2px solid #00d4ff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 20px; }
        .liger-display { font-family: 'Courier New', monospace; font-size: 48px; color: #00d4ff; font-weight: bold; min-width: 130px; text-align: center; }
    </style>
</head>
<body>

<div class="column">
    <div class="fixed-header">
        <div class="top-info-row">
            <div style="text-align:center">
                <div id="masterClock" class="main-timer">9:59</div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="text" id="syncInput" class="sync-input" placeholder="945">
                <button id="startBtn" class="start-btn" onclick="toggleTimer()">START</button>
            </div>
        </div>
    </div>

    <div id="wrapperA">
        <div class="table-header-controls">
            <span style="font-size:18px; color:#ffff00; font-weight:bold;">サークル補正</span>
            <button class="btn-calib btn-calib-A" onclick="adjustMasterTime(1)">＋</button>
            <button class="btn-calib btn-calib-A" onclick="adjustMasterTime(-1)">－</button>
        </div>
        <div class="table-container" id="containerA" onclick="triggerCalamity('A')">
            <table id="tableA">
                <thead><tr><th>#</th><th>予定</th><th>種別</th><th>減算</th><th>判定</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="column">
    <div class="fixed-header">
        <div class="top-info-row">
            <div class="liger-container">
                <button class="btn-liger" onclick="calculateLiger()">ライガー</button>
                <div id="ligerDisplay" class="liger-display">--:--</div>
            </div>
        </div> 
    </div>

    <div id="wrapperG">
        <div class="table-header-controls">
            <span style="font-size:18px; color:#ff4444; font-weight:bold;">グランド補正</span>
            <button class="btn-calib btn-calib-G" onclick="adjustMasterTime(1)">＋</button>
            <button class="btn-calib btn-calib-G" onclick="adjustMasterTime(-1)">－</button>
        </div>
        <div class="table-container" id="containerG" onclick="triggerCalamity('G')">
            <table id="tableG">
                <thead><tr><th>#</th><th>予定</th><th>種別</th><th>減算</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const configA = [[1,"線上",0,""],[2,"線上",24,"おそ"],[3,"金網",21,""],[4,"線上",23,"おそ"],[5,"外周",21,""],[6,"金網",25,"おそ"],[1,"線上",20,""],[2,"線上",24,"おそ"],[3,"金網",21,""],[4,"線上",24,"おそ"],[5,"外周",20,""],[6,"金網",24,"おそ"],[1,"線上",21,""],[2,"線上",24,"おそ"],[3,"金網",20,""],[4,"線上",24,"おそ"],[5,"外周",21,""],[6,"金網",24,"おそ"],[1,"線上",20,""]];
const configG = [[1,"虹",0],[2,"黄（初回：金網線上、安置外周）",22],[3,"虹",24],[4,"黄（初回：真ん中線外、安置外周）",23],[5,"虹",24],[6,"黄（初回：金網線上、安置なし）",23],[7,"虹",23],[8,"黄（線上安置）",24],[9,"虹",24],[10,"黄（金網上安置）",22],[11,"虹",24],[12,"黄（線上外側安置）",23],[13,"虹",22],[14,"黄（初回：金網線上、安置外周）",24],[15,"虹",24],[16,"黄（初回：真ん中線外、安置外周）",22],[17,"虹",24]];

let startTimeMS = null;
let timerId = null;
let inputSecs = { A: null, G: null };
const DEFAULT_START_SEC = 599;
let lastPlayedSec = -1;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function toggleTimer() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (startTimeMS === null) { startTimer(); } else { resetTimer(); }
}

function startTimer(offsetSec = DEFAULT_START_SEC) {
    const btn = document.getElementById('startBtn');
    startTimeMS = Date.now() - (DEFAULT_START_SEC - offsetSec) * 1000;
    btn.textContent = "RUNNING";
    btn.classList.add('running');
    if (timerId) clearInterval(timerId);
    timerId = setInterval(updateAll, 100); 
}

// 【修正】プラスを押せば「残り時間」が増え、スケジュールも「未来」へズレる
function adjustMasterTime(seconds) {
    if (startTimeMS === null) return;
    
    // 1. バトルタイム（カウントダウン）を増やすために、開始時刻を「未来」へずらす
    // (Date.now() - startTimeMS) を小さくすることで、残り時間を増やす
    startTimeMS += (seconds * 1000);
    
    // 2. 表内の予定時刻（inputSecs）も、押したボタンの秒数分だけ直接加減算する
    if (inputSecs.A !== null) { 
        inputSecs.A += seconds; 
        renderTable('A'); 
    }
    if (inputSecs.G !== null) { 
        inputSecs.G !== null; 
        inputSecs.G += seconds; 
        renderTable('G'); 
    }
    
    // 3. 画面表示を即座に更新
    updateAll(); 
}

function resetTimer() {
    const btn = document.getElementById('startBtn');
    startTimeMS = null;
    if (timerId) clearInterval(timerId);
    timerId = null;
    btn.textContent = "START";
    btn.classList.remove('running');
    document.getElementById('masterClock').textContent = "9:59";
    document.getElementById('ligerDisplay').textContent = "--:--";
    document.getElementById('syncInput').value = "";
    inputSecs = { A: null, G: null };
    lastPlayedSec = -1;
    document.querySelector('#tableA tbody').innerHTML = "";
    document.querySelector('#tableG tbody').innerHTML = "";
}

function triggerCalamity(type) {
    if (inputSecs[type] !== null) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const container = document.getElementById(`container${type}`);
    container.classList.remove(`flash-${type}`);
    void container.offsetWidth; 
    container.classList.add(`flash-${type}`);

    const syncVal = document.getElementById('syncInput').value.trim();
    if (syncVal !== "") {
        const cleanInput = syncVal.replace(/:/g, "");
        let totalSec = 0;
        if (cleanInput.length >= 3) {
            const m = parseInt(cleanInput.slice(0, -2));
            const s = parseInt(cleanInput.slice(-2));
            totalSec = m * 60 + s;
        } else {
            totalSec = parseInt(cleanInput);
        }
        if (!isNaN(totalSec) && totalSec <= DEFAULT_START_SEC) {
            startTimer(totalSec);
            document.getElementById('syncInput').value = "";
        }
    }

    if (startTimeMS === null) return;

    const elapsed = (Date.now() - startTimeMS) / 1000;
    const currentClock = DEFAULT_START_SEC - elapsed;
    const offset = (type === 'A' ? 5 : 6);
    inputSecs[type] = Math.floor(currentClock) - offset;
    renderTable(type);
}

function updateAll() {
    const elapsed = (Date.now() - startTimeMS) / 1000;
    const currentClock = DEFAULT_START_SEC - elapsed;
    const currentSecFloor = Math.floor(currentClock);

    if (currentClock <= 0) { resetTimer(); return; }
    document.getElementById('masterClock').textContent = formatTime(currentSecFloor);
    
    const isRainbowActive = (inputSecs.G !== null);
    checkAudio(currentSecFloor, isRainbowActive);

    if (inputSecs.A !== null) updateHighlights('A', currentClock, isRainbowActive);
    if (inputSecs.G !== null) updateHighlights('G', currentClock, false);
}

function checkAudio(currentSecFloor, isRainbowActive) {
    if (currentSecFloor === lastPlayedSec) return;
    let targets = [];
    if (inputSecs.G !== null) { targets = getScheduledTimes('G'); }
    else if (inputSecs.A !== null && !isRainbowActive) { targets = getScheduledTimes('A'); }
    targets.forEach(t => {
        const diff = currentSecFloor - t;
        if (diff === 3 || diff === 2 || diff === 1) { playTone(440, 0.15); lastPlayedSec = currentSecFloor; }
        else if (diff === 0) { playTone(880, 0.8); lastPlayedSec = currentSecFloor; }
    });
}

function getScheduledTimes(type) {
    const rows = document.querySelectorAll(`#table${type} tbody tr`);
    let times = [];
    rows.forEach(r => times.push(parseInt(r.dataset.time)));
    return times;
}

function calculateLiger() {
    if (startTimeMS === null) return;
    const elapsed = (Date.now() - startTimeMS) / 1000;
    const currentClock = DEFAULT_START_SEC - elapsed;
    const ligerTime = currentClock - 65;
    document.getElementById('ligerDisplay').textContent = formatTime(Math.floor(ligerTime));
}

function formatTime(totalSec) {
    const abs = Math.floor(Math.abs(totalSec));
    const m = Math.floor(abs / 60);
    const s = abs % 60;
    return (totalSec < 0 ? "-" : "") + m + ":" + s.toString().padStart(2, '0');
}

function renderTable(type) {
    const tbody = document.querySelector(`#table${type} tbody`);
    tbody.innerHTML = "";
    let cumulative = 0;
    const config = (type === 'A' ? configA : configG);
    config.forEach((row) => {
        cumulative += row[2];
        const rowSec = inputSecs[type] - cumulative;
        const tr = document.createElement("tr");
        tr.dataset.time = rowSec;
        const cells = [row[0], formatTime(rowSec), row[1], row[2]];
        if (type === 'A') cells.push(row[3]);
        cells.forEach(c => { const td = document.createElement("td"); td.textContent = c; tr.appendChild(td); });
        tbody.appendChild(tr);
    });
}

function updateHighlights(type, currentClock, isPaused) {
    const rows = document.querySelectorAll(`#table${type} tbody tr`);
    if (isPaused && type === 'A') { rows.forEach(row => row.className = ""); return; }
    let nextRow = null;
    rows.forEach(row => {
        const rowSec = parseInt(row.dataset.time);
        row.className = "";
        if (!nextRow && rowSec < currentClock - 2) nextRow = row;
        if (Math.abs(currentClock - rowSec) <= 2) row.className = "current-row";
    });
    if (nextRow && nextRow.className !== "current-row") nextRow.className = "next-row";
    const target = document.querySelector(`#table${type} .current-row`) || nextRow;
    if (target) {
        const container = document.getElementById(`container${type}`);
        container.scrollTop = target.offsetTop - (container.clientHeight * 0.3);
    }
}
</script>
</body>
</html>
